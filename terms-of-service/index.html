<!DOCTYPE html>
<html>

<head>
  <script>
    const userLang = navigator.language || navigator.userLanguage;
    const targetLang = userLang.toLowerCase().startsWith('pt') ? 'pt' : 'en';

    window.location.replace(`./${targetLang}/`);
  </script>
</head>

<body>
  <p>Redirecting to your language...</p>
</body>

</html>
